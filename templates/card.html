<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #0a0a0a;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .bg-gradient {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, {{ accent_color }}18 0%, #0a0a0a 60%);
  }

  .grid-lines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .accent-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 6px;
    background: {{ accent_color }};
    box-shadow: 0 0 30px {{ accent_color }}80;
  }

  .inner {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 60px 70px 50px 80px;
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 50px;
  }

  .topic-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: 100px;
    border: 1px solid {{ accent_color }}50;
    background: {{ accent_color }}15;
  }

  .topic-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: {{ accent_color }};
    box-shadow: 0 0 8px {{ accent_color }};
  }

  .topic-name {
    font-size: 15px;
    font-weight: 700;
    color: {{ accent_color }};
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-date {
    font-size: 15px;
    color: #444;
    font-weight: 400;
    letter-spacing: 2px;
    padding-top: 2px;
  }

  /* NEWS ITEMS */
  .news-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .news-item {
    padding: 26px 0;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .news-item:last-child {
    border-bottom: none;
  }

  .news-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .news-number {
    font-size: 12px;
    font-weight: 700;
    color: {{ accent_color }};
    letter-spacing: 1px;
    min-width: 28px;
    padding-top: 3px;
  }

  .news-title {
    font-size: 20px;
    font-weight: 700;
    color: #f0f0f0;
    line-height: 1.3;
  }

  .news-summary {
    font-size: 15px;
    color: #777;
    line-height: 1.6;
    padding-left: 42px;
  }

  .news-source {
    font-size: 12px;
    color: #444;
    padding-left: 42px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* FOOTER */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 24px;
    border-top: 1px solid #1a1a1a;
  }

  .handle {
    font-size: 16px;
    font-weight: 700;
    color: #333;
    letter-spacing: 1px;
  }

  .briefing-label {
    font-size: 12px;
    color: #2a2a2a;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .corner-tl, .corner-tr {
    position: absolute;
    width: 30px;
    height: 30px;
    z-index: 20;
  }
  .corner-tl { top: 30px; left: 30px; border-top: 1px solid #222; border-left: 1px solid #222; }
  .corner-tr { top: 30px; right: 30px; border-top: 1px solid #222; border-right: 1px solid #222; }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="grid-lines"></div>
  <div class="accent-bar"></div>
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>

  <div class="inner">
    <div class="header">
      <div class="topic-badge">
        <div class="topic-dot"></div>
        <div class="topic-name">{{ topic_name }}</div>
      </div>
      <div class="header-date">{{ date }}</div>
    </div>

    <div class="news-list">
      {% for item in news_items %}
      <div class="news-item">
        <div class="news-header">
          <div class="news-number">{{ "%02d"|format(loop.index) }}</div>
          <div class="news-title">{{ item.title }}</div>
        </div>
        <div class="news-summary">{{ item.summary }}</div>
        <div class="news-source">{{ item.source }}</div>
      </div>
      {% endfor %}
    </div>

    <div class="footer">
      <div class="handle">@renatadoro1</div>
      <div class="briefing-label">Daily Briefing</div>
    </div>
  </div>
</body>
</html>
