<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #0a0a0a;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .bg-gradient {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, #1a1a2e 0%, #0a0a0a 70%);
  }

  .grid-lines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .label {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 8px;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .title {
    font-size: 96px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -2px;
    line-height: 1;
    text-align: center;
  }

  .title span {
    background: linear-gradient(135deg, #ffffff 0%, #aaaaaa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .divider {
    width: 120px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #ffffff, transparent);
    margin: 40px 0;
  }

  .date {
    font-size: 22px;
    font-weight: 300;
    color: #888;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .topics {
    display: flex;
    gap: 12px;
    margin-top: 60px;
  }

  .topic-pill {
    padding: 8px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid;
  }

  .pill-geo   { color: #EF4444; border-color: #EF444440; background: #EF444415; }
  .pill-eco   { color: #10B981; border-color: #10B98140; background: #10B98115; }
  .pill-ia    { color: #8B5CF6; border-color: #8B5CF640; background: #8B5CF615; }
  .pill-web3  { color: #F59E0B; border-color: #F59E0B40; background: #F59E0B15; }
  .pill-crypto{ color: #F97316; border-color: #F9731640; background: #F9731615; }

  .footer {
    position: absolute;
    bottom: 50px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  .handle {
    font-size: 20px;
    font-weight: 600;
    color: #444;
    letter-spacing: 1px;
  }

  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #333;
  }

  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: absolute;
    width: 40px;
    height: 40px;
  }
  .corner-tl { top: 40px; left: 40px; border-top: 2px solid #333; border-left: 2px solid #333; }
  .corner-tr { top: 40px; right: 40px; border-top: 2px solid #333; border-right: 2px solid #333; }
  .corner-bl { bottom: 40px; left: 40px; border-bottom: 2px solid #333; border-left: 2px solid #333; }
  .corner-br { bottom: 40px; right: 40px; border-bottom: 2px solid #333; border-right: 2px solid #333; }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="grid-lines"></div>
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>

  <div class="content">
    <div class="label">Resumo do dia</div>
    <div class="title"><span>DAILY<br>BRIEFING</span></div>
    <div class="divider"></div>
    <div class="date">{{ date }}</div>
    <div class="topics">
      <div class="topic-pill pill-geo">Geopolítica</div>
      <div class="topic-pill pill-eco">Economia</div>
      <div class="topic-pill pill-ia">IA</div>
      <div class="topic-pill pill-web3">Web3</div>
      <div class="topic-pill pill-crypto">Cripto</div>
    </div>
  </div>

  <div class="footer">
    <div class="handle">@renatadoro1</div>
  </div>
</body>
</html>
