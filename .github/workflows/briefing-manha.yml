name: Briefing Manhã (08h BRT)
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Gerar briefing
        run: node runner.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Salvar HTML no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "bot: daily-briefing $(date -u '+%Y-%m-%d') manha"
          git push
      - name: Publicar no daily-briefing-html
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/renatadoro12/daily-briefing-html.git /tmp/pages
          cp -r docs/. /tmp/pages/
          cd /tmp/pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "briefing $(date -u '+%Y-%m-%d') manha"
          git push
