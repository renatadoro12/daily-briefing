name: Briefing Tarde (16h BRT)
on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Gerar briefing
        run: node runner.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Salvar HTML no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "bot: daily-briefing $(date -u '+%Y-%m-%d') tarde"
          git push
      - name: Deploy no Netlify
        run: npx --yes netlify-cli deploy --prod --dir=docs --auth=${{ secrets.NETLIFY_TOKEN }} --site=4d527e3f-1e68-40be-8611-6f73a46e9c0e
